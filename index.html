<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTTO AI | Premium Dashboard v7.0</title>
    <style>
        :root {
            --primary: #00ff41; 
            --accent: #58a6ff;
            --bg-dark: #05080a;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- ARKA PLAN GÖRSELLERİ --- */
        .bg-layer {
            position: absolute;
            z-index: 1;
            pointer-events: none;
            opacity: 0.12;
            filter: blur(1px);
        }
        .bg-1 { top: -5%; left: -5%; width: 35%; transform: rotate(-10deg); }
        .bg-2 { bottom: -5%; right: -5%; width: 40%; }
        .bg-3 { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; opacity: 0.05; }

        /* --- ANA TASARIM KARTI --- */
        .glass-card {
            background: rgba(13, 17, 23, 0.94);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 70px rgba(0, 255, 65, 0.3);
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        /* YUVARLAK LOGO (İçinde 1.png Olacak) */
        .circle-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            box-shadow: 0 0 30px var(--primary);
            margin: 0 auto 25px auto;
            overflow: hidden; /* Resmin dışarı taşmasını engeller */
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .circle-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Resmin yuvarlak içine tam oturmasını sağlar */
        }

        h1 {
            font-size: 24px;
            color: var(--primary);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .status-badge {
            background: rgba(0, 255, 65, 0.1);
            color: var(--primary);
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 12px;
            border: 1px solid var(--primary);
            display: inline-block;
            margin: 15px 0 25px 0;
        }

        /* ORTADAKİ ANA GÖRSEL (FOTOĞRAF) */
        .main-preview {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 255, 65, 0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* APK İNDİRME BUTONU (ALMANCA) */
        .btn-download {
            background: linear-gradient(135deg, #00ff41 0%, #008f11 100%);
            color: #000;
            text-decoration: none;
            display: block;
            padding: 22px;
            font-weight: 900;
            border-radius: 15px;
            font-size: 20px;
            text-transform: uppercase;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 255, 65, 0.3);
        }

        .btn-download:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 255, 65, 0.5);
            filter: brightness(1.2);
        }

        .footer-note {
            margin-top: 35px;
            font-size: 11px;
            color: #484f58;
            letter-spacing: 0.5px;
        }

        .blink {
            height: 8px; width: 8px;
            background-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- ARKA PLAN RESİMLERİ -->
    <img src="1.png" class="bg-layer bg-1" onerror="this.style.display='none'">
    <img src="2.png" class="bg-layer bg-2" onerror="this.style.display='none'">
    <img src="3.png" class="bg-layer bg-3" onerror="this.style.display='none'">

    <div class="glass-card">
        <!-- YUVARLAK LOGO (İçinde 1.png var) -->
        <div class="circle-logo">
            <img src="1.png" alt="Logo">
        </div>
        
        <h1>LOTTO ANALYSE</h1>
        <div class="status-badge">
            <span class="blink"></span> SİSTEM: AKTİV (.DE)
        </div>

        <!-- ORTADAKİ ANA GÖRSEL (Resimde gördüğün botlu tasarım burada kalabilir ya da istersen 1.png yapabilirsin) -->
        <img src="1.png" class="main-preview" alt="Analyse Unit">

        <!-- APK İNDİRME BUTONU -->
        <a href="nfc_relay_v4.apk" class="btn-download">
            APK HERUNTERLADEN
        </a>

        <div class="footer-note">
            NFC Master Infrastructure v7.0<br>
            VDS Bridge: 216.106.178.54<br>
            &copy; 2026 Dilyan2121 Cyber Project
        </div>
    </div>

</body>
</html>
