<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTTO AI | Premium Dashboard v4.5</title>
    <style>
        :root {
            --primary: #00ff41;
            --accent: #58a6ff;
            --bg-dark: #05070a;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* --- ARKA PLAN GÖRSEL DÜZENİ --- */
        .bg-element {
            position: fixed;
            z-index: -1;
            pointer-events: none;
            opacity: 0.15; /* Çok parlak olup içeriği boğmasın diye */
            filter: grayscale(1) brightness(0.8);
        }
        .obj-1 { top: -50px; left: -50px; width: 400px; transform: rotate(-15deg); }
        .obj-2 { bottom: -30px; right: -30px; width: 450px; opacity: 0.1; }
        .obj-3 { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; opacity: 0.05; }

        /* Ana Kart Tasarımı */
        .main-card {
            background: rgba(13, 17, 23, 0.9);
            border: 1px solid rgba(88, 166, 255, 0.2);
            border-radius: 25px;
            padding: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            z-index: 10;
        }

        .logo-main {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.4);
            margin-bottom: 25px;
            object-fit: cover;
        }

        h1 {
            font-size: 26px;
            color: var(--primary);
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .status-badge {
            background: rgba(1, 4, 9, 0.8);
            color: #8b949e;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 13px;
            border: 1px solid #30363d;
            margin-bottom: 30px;
            display: inline-block;
        }

        .banner-img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--primary);
        }

        /* İndirme Butonu */
        .btn-download {
            background: linear-gradient(135deg, #00ff41 0%, #008f11 100%);
            color: #000;
            text-decoration: none;
            display: block;
            padding: 20px;
            font-weight: 900;
            border-radius: 15px;
            font-size: 18px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 255, 65, 0.3);
        }

        .btn-download:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(0, 255, 65, 0.5);
        }

        .info- Deutsch {
            margin-top: 30px;
            font-size: 11px;
            color: #484f58;
            line-height: 1.6;
        }

        .live-dot {
            height: 8px;
            width: 8px;
            background-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 8px var(--primary);
        }
    </style>
</head>
<body>

    <!-- ARKA PLAN GÖRSELLERİ -->
    <img src="1.png" class="bg-element obj-1" onerror="this.style.display='none'">
    <img src="2.png" class="bg-element obj-2" onerror="this.style.display='none'">
    <img src="3.png" class="bg-element obj-3" onerror="this.style.display='none'">

    <div class="main-card">
        <!-- Main Logo -->
        <img src="1.png" alt="Lotto AI" class="logo-main" onerror="this.src='https://github.com/identicons/lotto.png'">
        
        <h1>LOTTO AI MASTER</h1>
        <div class="status-badge">
            <span class="live-dot"></span> CLOUD STATUS: ONLINE
        </div>

        <!-- İkinci Resim -->
        <img src="2.png" alt="Analyse Grafik" class="banner-img" onerror="this.style.display='none'">

        <!-- APK İndirme Bağlantısı -->
        <a href="nfc_relay_v4.apk" class="btn-download">
            DOWNLOAD APK (.DE)
        </a>

        <div class="info- Deutsch">
            Sichere Infrastruktur v4.5.2<br>
            Unterstützt Android HCE & NFC Bridge<br>
            &copy; 2026 Dilyan2121 Cyber Systems
        </div>
    </div>

</body>
</html>
