<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTTO AI | Premium Dashboard</title>
    <!-- Google Fonts ve FontAwesome kütüphaneleri tasarımı zenginleştirir -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff41; /* Hacker Yeşili */
            --accent: #58a6ff;  /* Lotto Mavisi */
            --bg-dark: #0a0c10;
            --card-bg: rgba(22, 27, 34, 0.9);
        }

        body {
            background: var(--bg-dark) url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Cam efekti (Glassmorphism) */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
        }

        .logo-container img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            padding: 5px;
            box-shadow: 0 0 20px var(--primary);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .logo-container img:hover {
            transform: scale(1.05) rotate(5deg);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            letter-spacing: 3px;
            color: var(--primary);
            margin: 10px 0;
            text-transform: uppercase;
        }

        .status-badge {
            background: rgba(0, 255, 65, 0.1);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid var(--primary);
        }

        .display-screen {
            background: #000;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            border: 1px inset #333;
            min-height: 60px;
        }

        .numbers {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--accent);
        }

        .btn-action {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary), #008f11);
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 255, 65, 0.3);
        }

        .btn-action:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 255, 65, 0.5);
            filter: brightness(1.2);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #8b949e;
            opacity: 0.7;
        }

        /* Animasyon */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .live-dot {
            height: 10px;
            width: 10px;
            background-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <div class="logo-container">
            <!-- logo.png yüklersen o gözükür, yoksa GitHub profil resmin gözükür -->
            <img src="logo.png" alt="Lotto AI" onerror="this.src='https://github.com/identicons/lotto.png'">
        </div>

        <h1>Lotto AI Master</h1>
        <div class="status-badge">
            <span class="live-dot"></span> SİSTEM AKTİF v2.0
        </div>

        <p style="color: #8b949e; font-size: 14px;">Algoritmik Tahmin ve Veri Analiz Paneli</p>

        <div class="display-screen">
            <div id="numberDisplay" class="numbers">-- -- -- -- -- --</div>
        </div>

        <button class="btn-action" onclick="generateNumbers()">ANALİZİ BAŞLAT</button>

        <div class="footer-text">
            &copy; 2026 CryptoLotto Infrastructure <br>
            Secure Neural Network Encrypted
        </div>
    </div>

    <script>
        function generateNumbers() {
            const display = document.getElementById('numberDisplay');
            let count = 0;
            
            // Efekt için rastgele sayılar döndür
            const interval = setInterval(() => {
                let tempNums = Array.from({length: 6}, () => Math.floor(Math.random() * 49) + 1);
                display.innerText = tempNums.join('  ');
                count++;
                
                if (count > 15) {
                    clearInterval(interval);
                    // Final sayılarını üret
                    let finalNums = [];
                    while(finalNums.length < 6) {
                        let r = Math.floor(Math.random() * 49) + 1;
                        if(finalNums.indexOf(r) === -1) finalNums.push(r);
                    }
                    display.innerText = finalNums.sort((a,b)=>a-b).join('  ');
                }
            }, 50);
        }
    </script>
</body>
</html>
