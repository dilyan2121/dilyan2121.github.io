<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto AI | Premium Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #05070a;
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #112244 0%, #05070a 100%);
        }

        .main-card {
            background: rgba(13, 17, 23, 0.85);
            border: 1px solid #30363d;
            border-radius: 24px;
            padding: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
        }

        /* İstediğin Logo Dizini */
        .logo-main {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
            margin-bottom: 30px;
            object-fit: cover;
        }

        .secondary-img {
            width: 100%;
            max-width: 300px;
            border-radius: 12px;
            margin: 20px 0;
            opacity: 0.8;
            border: 1px solid #58a6ff;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            color: #00ff41;
            letter-spacing: 2px;
            margin: 10px 0;
        }

        .status {
            font-size: 14px;
            color: #8b949e;
            background: #161b22;
            padding: 8px 15px;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid #30363d;
            margin-bottom: 25px;
        }

        .btn-start {
            background: linear-gradient(135deg, #00ff41 0%, #008f11 100%);
            color: #000;
            border: none;
            padding: 15px 35px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-start:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.6);
        }

        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #484f58;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <!-- BİRİNCİ GÖRSEL (LOGO) -->
        <img src="1.png" alt="Lotto AI Logo" class="logo-main" onerror="this.src='https://github.com/identicons/lotto.png'">
        
        <h1>LOTTO ANALYZER</h1>
        <div class="status">● SYSTEM CLOUD ACTIVE</div>

        <!-- İKİNCİ GÖRSEL (BANNER VEYA EK RESİM) -->
        <img src="2.png" alt="Analiz Görseli" class="secondary-img" onerror="this.style.display='none'">

        <button class="btn-start" onclick="alert('Analiz Başlatıldı...')">SİSTEMİ ÇALIŞTIR</button>

        <div class="footer">
            Secure Infrastructure // GitHub Pages Deployment
        </div>
    </div>

</body>
</html>
